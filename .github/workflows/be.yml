name: Be CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backEnd/**'
      - 'proto-schema/**' # Quan trọng: Chạy CI nếu schema thay đổi
      - '.github/workflows/be.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backEnd/**'
      - 'proto-schema/**'
      - '.github/workflows/be.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Database Service cho Testing (Sử dụng MySQL vì bạn dùng mysql-connector-j)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: datn_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    defaults:
      run:
        working-directory: backEnd

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive # Nếu proto-schema là submodule

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # Bản phân phối Java phổ biến & ổn định
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate Proto Sources
      run: ./gradlew generateProto
      # Bước này đảm bảo Protobuf được compile từ ../proto-schema trước khi build code chính

    - name: Build with Gradle
      run: ./gradlew build -x test 
      # Build project, tạm thời bỏ qua test nếu bạn chưa cấu hình xong DB kết nối

    - name: Run Tests
      run: ./gradlew test
      env:
        # Cấu hình biến môi trường để Test có thể kết nối tới Service MySQL ở trên
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/datn_db
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root