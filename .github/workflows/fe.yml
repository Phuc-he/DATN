name: React frontend CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/fe.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/fe.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x # Recommended for Next.js 14+
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # Optimized caching for Next.js
    - name: Restore Next.js Cache
      uses: actions/cache@v3
      with:
        path: |
          ${{ github.workspace }}/frontend/.next/cache
        # Generate a new cache whenever packages or source files change
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

    - name: Install Dependencies
      run: npm ci # Use 'ci' for reliable, faster installs

    - name: Lint
      run: npm run lint

    # Note: If you don't have a 'test' script in package.json yet, 
    # you can comment this out to prevent the build from failing.
    # - name: Run Tests
    #   run: npm test -- --watchAll=false --passWithNoTests
    #   env:
    #     CI: true

    - name: Build Production Bundle
      run: npm run build
      # env:
        # If your frontend needs these during build time (e.g. for Static Site Gen)
        # NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        # Disable linting during build since we ran it as a separate step
        # NEXT_TELEMETRY_DISABLED: 1